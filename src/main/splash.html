<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MCL-SIT — Démarrage</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 100%; height: 100%;
        background: radial-gradient(circle at 30% 30%, #15252b 0%, #0a1012 70%, #050708 100%);
        font-family: 'Courier New', monospace;
        color: #c8d1c8;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
    }
    body {
        display: flex; flex-direction: column;
        padding: 24px 32px;
    }
    .led-bar {
        display: flex; gap: 7px;
        margin-bottom: 18px;
    }
    .led {
        width: 12px; height: 12px; border-radius: 50%;
        background: #1a2528;
        border: 1px solid #2a3a3d;
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
    }
    .led.on { background: #7ee36c; border-color: #5fa860; box-shadow: 0 0 6px rgba(126,227,108,0.6), inset 0 1px 1px rgba(255,255,255,0.2); }
    .led.amber { background: #ef9f27; border-color: #b07820; box-shadow: 0 0 5px rgba(239,159,39,0.5); }
    .header {
        display: flex; align-items: center; gap: 16px;
        margin-bottom: 6px;
    }
    .header .hex {
        width: 36px; height: 36px;
        background: #0c1517;
        border: 2px solid #5fa8c2;
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        display: flex; align-items: center; justify-content: center;
    }
    .header .hex::after {
        content: '';
        width: 12px; height: 12px;
        background: #5fa8c2;
        border-radius: 50%;
    }
    .title-block { line-height: 1.05; }
    .title {
        font-size: 24px; font-weight: 900;
        letter-spacing: 4px;
        color: #e8efe8;
        text-shadow: 0 0 8px rgba(95,168,194,0.35);
    }
    .subtitle {
        font-size: 11px; font-weight: 700;
        color: #5fa8c2;
        letter-spacing: 3px;
        margin-top: 3px;
    }
    .version-chip {
        margin-left: auto;
        font-size: 10px;
        color: #7ee36c;
        border: 1px solid rgba(126,227,108,0.4);
        background: rgba(15,30,18,0.6);
        padding: 4px 10px;
        letter-spacing: 1.5px;
        font-weight: 800;
    }
    .question {
        font-size: 12px;
        color: #9fb8a8;
        margin: 20px 0 14px 0;
        letter-spacing: 1.5px;
        text-transform: uppercase;
    }
    .modes {
        display: flex; flex-direction: column;
        gap: 10px;
        flex: 1;
    }
    .mode-btn {
        background: linear-gradient(180deg, #16252a, #0a1316);
        border: 1px solid rgba(95,168,194,0.35);
        border-radius: 4px;
        padding: 14px 18px;
        color: #c8d1c8;
        font-family: 'Courier New', monospace;
        font-size: 13px;
        cursor: pointer;
        text-align: left;
        display: flex; align-items: center; gap: 16px;
        transition: background 80ms, border-color 80ms, transform 60ms;
    }
    .mode-btn:hover {
        background: linear-gradient(180deg, #1e323a, #11212a);
        border-color: rgba(95,168,194,0.85);
    }
    .mode-btn:active { transform: translateY(1px); }
    .mode-btn .ico {
        width: 36px; height: 36px;
        flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        background: #0a1012;
        border: 1px solid rgba(126,227,108,0.4);
        border-radius: 4px;
        font-size: 18px;
        color: #7ee36c;
        font-weight: 900;
    }
    .mode-btn .label {
        font-size: 14px; font-weight: 800;
        letter-spacing: 2px;
        color: #e8efe8;
    }
    .mode-btn .desc {
        font-size: 10px;
        color: #7e9690;
        margin-top: 3px;
        letter-spacing: 0.5px;
    }
    .remember-row {
        margin-top: 16px;
        display: flex; align-items: center; gap: 8px;
        font-size: 11px;
        color: #9fb8a8;
        letter-spacing: 0.5px;
    }
    .remember-row input { accent-color: #5fa8c2; }
    .footer {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid rgba(120,150,150,0.18);
        display: flex; justify-content: space-between; align-items: center;
        font-size: 9px;
        color: #5a6a6a;
        letter-spacing: 1px;
    }
    .footer .brand {
        font-family: 'Courier New', monospace;
        font-style: italic;
        color: #7e9690;
        font-size: 11px;
    }
    .footer .copyright { font-size: 9px; }
    .check-status {
        font-size: 10px;
        color: #7ee36c;
        margin-top: 4px;
        letter-spacing: 1px;
        opacity: 0.8;
    }
    .check-status.warn { color: #ef9f27; }
    .check-status.err { color: #ef554f; }
</style>
</head>
<body>
    <div class="led-bar">
        <div class="led on"></div>
        <div class="led on"></div>
        <div class="led on"></div>
        <div class="led amber"></div>
    </div>
    <div class="header">
        <div class="hex"></div>
        <div class="title-block">
            <div class="title">MCL-SIT</div>
            <div class="subtitle">PROJECT — SIT DCS</div>
        </div>
        <div class="version-chip" id="version">v16.0.0</div>
    </div>
    <div class="check-status" id="checks">SYSTÈME PRÊT</div>

    <div class="question">Mode de lancement</div>
    <div class="modes">
        <button class="mode-btn" data-mode="client">
            <div class="ico">C</div>
            <div>
                <div class="label">CLIENT</div>
                <div class="desc">Se connecter à un serveur SIT existant sur le réseau</div>
            </div>
        </button>
        <button class="mode-btn" data-mode="server">
            <div class="ico" style="color:#ef9f27;border-color:rgba(239,159,39,0.4);">S</div>
            <div>
                <div class="label">SERVEUR</div>
                <div class="desc">Démarrer le hub SIT sur cette machine — icône zone notification</div>
            </div>
        </button>
        <button class="mode-btn" data-mode="both">
            <div class="ico" style="color:#5fa8c2;border-color:rgba(95,168,194,0.4);">+</div>
            <div>
                <div class="label">CLIENT + SERVEUR</div>
                <div class="desc">Démarrer le hub local + ouvrir le SIT (PC unique DCS+SIT)</div>
            </div>
        </button>
    </div>

    <label class="remember-row">
        <input type="checkbox" id="remember">
        Mémoriser ce choix et ne plus demander
    </label>

    <div class="footer">
        <div class="brand">MCL-SIT</div>
        <div class="copyright">131st-Dimitriov</div>
    </div>

<script>
// IPC bridge exposed by preload.js
const api = window.sitAPI;

async function init() {
    try {
        const info = await api.getAppInfo();
        document.getElementById('version').textContent = 'v' + info.version;
        const checks = document.getElementById('checks');
        const parts = [];
        if (info.hookStatus === 'ok') parts.push('HOOK DCS OK');
        else if (info.hookStatus === 'missing') parts.push('HOOK DCS ABSENT');
        else if (info.hookStatus === 'outdated') parts.push('HOOK DCS À METTRE À JOUR');
        else parts.push('HOOK DCS NON CONFIGURÉ');
        checks.textContent = parts.join('  ·  ');
        if (info.hookStatus === 'outdated' || info.hookStatus === 'missing') checks.classList.add('warn');
    } catch(e) {
        console.error('init failed:', e);
    }
}

document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const mode = btn.dataset.mode;
        const remember = document.getElementById('remember').checked;
        api.chooseMode(mode, remember);
    });
});

init();
</script>
</body>
</html>
