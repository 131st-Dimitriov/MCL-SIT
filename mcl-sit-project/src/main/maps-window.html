<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MCL-SIT — Bibliothèque de cartes</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 100%; height: 100%;
        background: radial-gradient(circle at 30% 30%, #15252b 0%, #0a1012 70%, #050708 100%);
        font-family: 'Courier New', monospace;
        color: #c8d1c8;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
    }
    body { display: flex; flex-direction: column; padding: 18px 24px; }
    .led-bar { display: flex; gap: 7px; margin-bottom: 12px; }
    .led { width: 10px; height: 10px; border-radius: 50%; background: #1a2528; border: 1px solid #2a3a3d; }
    .led.on { background: #7ee36c; border-color: #5fa860; box-shadow: 0 0 6px rgba(126,227,108,0.6); }
    .led.amber { background: #ef9f27; border-color: #b07820; box-shadow: 0 0 5px rgba(239,159,39,0.5); }
    .header { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; }
    .header .hex {
        width: 30px; height: 30px; background: #0c1517;
        border: 2px solid #5fa8c2;
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        display: flex; align-items: center; justify-content: center;
    }
    .header .hex::after { content: ''; width: 11px; height: 11px; background: #5fa8c2; border-radius: 50%; }
    .title { font-size: 20px; font-weight: 900; letter-spacing: 4px; color: #e8efe8; }
    .subtitle { font-size: 10px; font-weight: 700; color: #5fa8c2; letter-spacing: 3px; margin-top: 2px; }
    .header .spacer { flex: 1; }
    .meta-chip {
        font-size: 10px;
        color: #9fb8a8;
        border: 1px solid rgba(120,150,150,0.4);
        background: rgba(15,25,30,0.6);
        padding: 4px 10px;
        letter-spacing: 1px;
    }
    .toolbar {
        display: flex; gap: 10px; align-items: center;
        margin: 14px 0 10px 0;
    }
    .toolbar input, .toolbar select {
        background: #0a1316; color: #e8efe8;
        border: 1px solid rgba(95,168,194,0.4);
        font-family: inherit; font-size: 11px;
        padding: 6px 10px;
    }
    .toolbar input:focus, .toolbar select:focus { outline: none; border-color: rgba(95,168,194,0.85); }
    .toolbar input.search { flex: 1; max-width: 320px; }
    .toolbar .spacer { flex: 1; }
    .btn {
        background: linear-gradient(180deg, #16252a, #0a1316);
        border: 1px solid rgba(95,168,194,0.4);
        color: #c8d1c8;
        font-family: inherit; font-size: 11px;
        padding: 7px 14px;
        letter-spacing: 1.5px; cursor: pointer;
        text-transform: uppercase;
    }
    .btn:hover { border-color: rgba(95,168,194,0.85); background: linear-gradient(180deg, #1e323a, #11212a); }
    .btn.primary { color: #7ed8f0; border-color: rgba(85,185,214,0.85); font-weight: 800; box-shadow: inset 0 0 8px rgba(85,185,214,0.2); }
    .btn.primary:hover { border-color: rgba(85,185,214,1); }
    .btn.danger { color: #ef554f; border-color: rgba(239,85,79,0.5); }
    .btn.danger:hover { border-color: rgba(239,85,79,0.95); }
    .table-wrap {
        flex: 1;
        overflow-y: auto;
        background: rgba(10,18,20,0.5);
        border: 1px solid rgba(120,150,150,0.18);
        border-radius: 4px;
        padding: 8px;
    }
    .map-card {
        display: grid;
        grid-template-columns: 96px 1fr auto;
        gap: 14px;
        align-items: center;
        background: rgba(20,30,32,0.55);
        border: 1px solid rgba(120,150,150,0.15);
        border-left: 3px solid #5fa8c2;
        padding: 10px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: background 80ms;
    }
    .map-card:hover { background: rgba(28,42,46,0.75); border-left-color: #7ed8f0; }
    .map-card .thumb {
        width: 96px; height: 96px;
        background: #0a1012;
        border: 1px solid rgba(95,168,194,0.3);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex; align-items: center; justify-content: center;
        color: #5a6a6a;
        font-size: 9px;
        letter-spacing: 1px;
    }
    .map-card .info { line-height: 1.5; min-width: 0; }
    .map-card .name {
        font-size: 14px; font-weight: 800;
        color: #e8efe8;
        letter-spacing: 1px;
        overflow: hidden; text-overflow: ellipsis;
        white-space: nowrap;
    }
    .map-card .row { display: flex; gap: 14px; font-size: 10px; color: #9fb8a8; letter-spacing: 0.5px; margin-top: 2px; }
    .map-card .row .lbl { color: #7e9690; }
    .map-card .row .val { color: #e8efe8; }
    .map-card .actions { display: flex; flex-direction: column; gap: 4px; }
    .map-card .actions button {
        background: rgba(15,25,28,0.6);
        border: 1px solid rgba(120,150,150,0.35);
        color: #c8d1c8;
        font-family: inherit; font-size: 10px;
        padding: 4px 12px;
        letter-spacing: 1.5px; cursor: pointer;
        text-transform: uppercase;
        min-width: 90px;
    }
    .map-card .actions button:hover { border-color: rgba(95,168,194,0.85); }
    .map-card .actions button.danger:hover { border-color: rgba(239,85,79,0.85); color: #ef554f; }

    .empty {
        text-align: center;
        padding: 60px 20px;
        color: #5a6a6a;
        font-size: 12px;
        letter-spacing: 1.5px;
    }
    .footer {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid rgba(120,150,150,0.18);
        display: flex; justify-content: space-between; align-items: center;
        font-size: 9px; color: #5a6a6a; letter-spacing: 1px;
    }

    /* Add/Edit modal */
    .modal-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(5,8,10,0.85);
        align-items: center; justify-content: center;
        z-index: 1000;
    }
    .modal-overlay.visible { display: flex; }
    .modal-box {
        background: linear-gradient(180deg, #101a1e 0%, #0a1316 100%);
        border: 1px solid rgba(95,168,194,0.55);
        border-radius: 6px;
        min-width: 520px; max-width: 620px;
        overflow: hidden;
    }
    .modal-header {
        background: linear-gradient(180deg, #1a2a30 0%, #0e1a1f 100%);
        border-bottom: 1px solid rgba(95,168,194,0.35);
        padding: 12px 20px;
        font-size: 12px; font-weight: 800;
        letter-spacing: 2.5px;
        color: #5fa8c2;
        text-transform: uppercase;
    }
    .modal-body { padding: 18px 20px; }
    .form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .form-row label { font-size: 10px; color: #7e9690; letter-spacing: 1.5px; text-transform: uppercase; }
    .form-row input, .form-row select {
        background: #0a1316; color: #e8efe8;
        border: 1px solid rgba(95,168,194,0.4);
        padding: 7px 10px;
        font-family: inherit; font-size: 12px;
    }
    .form-row input:focus, .form-row select:focus { outline: none; border-color: rgba(95,168,194,0.85); }
    .form-row.two-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-row.two-cols .col { display: flex; flex-direction: column; gap: 4px; }
    .modal-buttons { padding: 0 20px 16px 20px; display: flex; gap: 10px; justify-content: flex-end; }
    .modal-error {
        margin: 0 20px 12px 20px;
        color: #ef554f; font-size: 11px;
        padding: 8px 12px;
        background: rgba(239,85,79,0.08);
        border-left: 3px solid #ef554f;
        display: none;
    }
    .modal-error.visible { display: block; }
    .file-pick { display: flex; gap: 8px; align-items: center; }
    .file-pick .filename {
        flex: 1;
        font-size: 11px; color: #9fb8a8;
        background: rgba(10,18,20,0.6);
        border: 1px solid rgba(120,150,150,0.25);
        padding: 7px 10px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
</style>
</head>
<body>
    <div class="led-bar">
        <div class="led on"></div>
        <div class="led on"></div>
        <div class="led on"></div>
        <div class="led amber"></div>
    </div>
    <div class="header">
        <div class="hex"></div>
        <div>
            <div class="title">BIBLIOTHÈQUE DE CARTES</div>
            <div class="subtitle">MCL-SIT — V17</div>
        </div>
        <div class="spacer"></div>
        <div class="meta-chip" id="total-size">— Mo</div>
        <div class="meta-chip" id="total-count">0 cartes</div>
    </div>

    <div class="toolbar">
        <input class="search" id="search" placeholder="Rechercher par nom..." />
        <select id="filter-dcs">
            <option value="">Toutes les cartes DCS</option>
        </select>
        <div class="spacer"></div>
        <button class="btn primary" id="btn-add">+ Ajouter une carte</button>
    </div>

    <div class="table-wrap">
        <div id="map-list"></div>
    </div>

    <div class="footer">
        <div>Cliquez sur une carte pour la charger dans le SIT.</div>
        <div>131st-Dimitriov</div>
    </div>

    <!-- Add/Edit modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <div class="modal-header" id="modal-title">AJOUTER UNE CARTE</div>
            <div class="modal-body">
                <div class="form-row" id="row-file">
                    <label>Fichier image (PNG / JPG)</label>
                    <div class="file-pick">
                        <div class="filename" id="m-filename">Aucun fichier sélectionné</div>
                        <button class="btn" id="m-pick">Parcourir...</button>
                    </div>
                </div>
                <div class="form-row">
                    <label>Nom de la carte</label>
                    <input type="text" id="m-name" placeholder="ex: Zone de combat NTTR-3" maxlength="200" />
                </div>
                <div class="form-row">
                    <label>Carte DCS</label>
                    <select id="m-dcs"></select>
                </div>
                <div class="form-row">
                    <label>Coord. coin haut-gauche (ex: N 35°00.000' E 36°00.000')</label>
                    <input type="text" id="m-coord" placeholder="N 35°00.000' E 36°00.000'" />
                </div>
                <div class="form-row two-cols">
                    <div class="col">
                        <label>Largeur (km)</label>
                        <input type="number" id="m-width" step="0.1" min="0.1" placeholder="ex: 50" />
                    </div>
                    <div class="col">
                        <label>Hauteur (km)</label>
                        <input type="number" id="m-height" step="0.1" min="0.1" placeholder="ex: 50" />
                    </div>
                </div>
            </div>
            <div class="modal-error" id="m-error"></div>
            <div class="modal-buttons">
                <button class="btn" id="m-cancel">Annuler</button>
                <button class="btn primary" id="m-save">Enregistrer</button>
            </div>
        </div>
    </div>

<script>
const api = window.sitAPI;
const DCS_MAPS = ['Caucase', 'Nevada (NTTR)', 'Normandie', 'Persian Gulf', 'Syrie',
                  'Mariannes', 'Afghanistan', 'Sinaï', 'Kola', 'South Atlantic',
                  'Iraq', 'Germany Cold War', 'Autre'];

let allMaps = [];
let editingId = null;
let pickedFilePath = null;

function fmtBytes(b) {
    if (b < 1024) return b + ' o';
    if (b < 1024*1024) return (b/1024).toFixed(1) + ' Ko';
    if (b < 1024*1024*1024) return (b/1024/1024).toFixed(1) + ' Mo';
    return (b/1024/1024/1024).toFixed(2) + ' Go';
}

function escapeHTML(s) {
    return String(s).replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
}

function populateDcsSelects() {
    const filterSel = document.getElementById('filter-dcs');
    const formSel = document.getElementById('m-dcs');
    for (const m of DCS_MAPS) {
        const o1 = document.createElement('option');
        o1.value = m; o1.textContent = m;
        filterSel.appendChild(o1.cloneNode(true));
        formSel.appendChild(o1);
    }
}

async function refresh() {
    const r = await api.mapsList();
    allMaps = r.maps || [];
    document.getElementById('total-count').textContent = allMaps.length + ' carte' + (allMaps.length > 1 ? 's' : '');
    document.getElementById('total-size').textContent = fmtBytes(r.totalBytes || 0);
    render();
}

function render() {
    const list = document.getElementById('map-list');
    const search = document.getElementById('search').value.trim().toLowerCase();
    const filter = document.getElementById('filter-dcs').value;
    const filtered = allMaps.filter(m => {
        if (filter && m.dcsMap !== filter) return false;
        if (search && !m.name.toLowerCase().includes(search) && !m.dcsMap.toLowerCase().includes(search)) return false;
        return true;
    }).sort((a, b) => (b.dateAdded || '').localeCompare(a.dateAdded || ''));

    if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">' +
            (allMaps.length === 0
                ? 'Aucune carte enregistrée. Cliquez sur « + Ajouter une carte » pour commencer.'
                : 'Aucune carte ne correspond à la recherche.')
            + '</div>';
        return;
    }

    list.innerHTML = filtered.map(m => {
        const date = m.dateAdded ? new Date(m.dateAdded).toLocaleDateString('fr-FR') : '—';
        const thumbStyle = m.thumbPath ? '' : '';  // We'll set bg via JS after with the data URL
        return `<div class="map-card" data-id="${m.id}">
            <div class="thumb" data-thumb="${m.id}">${m.thumbPath ? '' : 'PAS DE<br>VIGNETTE'}</div>
            <div class="info">
                <div class="name">${escapeHTML(m.name)}</div>
                <div class="row">
                    <div><span class="lbl">DCS:</span> <span class="val">${escapeHTML(m.dcsMap)}</span></div>
                    <div><span class="lbl">DIM:</span> <span class="val">${m.widthKm} × ${m.heightKm} km</span></div>
                    <div><span class="lbl">DATE:</span> <span class="val">${date}</span></div>
                </div>
                ${m.cornerCoord ? '<div class="row"><div><span class="lbl">REF:</span> <span class="val">' + escapeHTML(m.cornerCoord) + '</span></div></div>' : ''}
            </div>
            <div class="actions">
                <button class="action-load" data-id="${m.id}">Charger</button>
                <button class="action-edit" data-id="${m.id}">Éditer</button>
                <button class="action-del danger" data-id="${m.id}">Supprimer</button>
            </div>
        </div>`;
    }).join('');

    // Load thumbnails asynchronously
    for (const m of filtered) {
        if (!m.thumbPath) continue;
        const el = list.querySelector('[data-thumb="' + m.id + '"]');
        if (!el) continue;
        api.mapsGetThumbnail(m.id).then(dataUrl => {
            if (dataUrl && el) {
                el.style.backgroundImage = 'url(' + dataUrl + ')';
                el.textContent = '';
            }
        });
    }

    // Card click = load (the entire card except actions buttons)
    list.querySelectorAll('.map-card').forEach(card => {
        card.addEventListener('click', (e) => {
            if (e.target.closest('.actions')) return;
            loadMap(card.dataset.id);
        });
    });
    list.querySelectorAll('.action-load').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation(); loadMap(b.dataset.id);
    }));
    list.querySelectorAll('.action-edit').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation(); openModalEdit(b.dataset.id);
    }));
    list.querySelectorAll('.action-del').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation(); confirmDelete(b.dataset.id);
    }));
}

async function loadMap(id) {
    // Notify main process — it will forward to the SIT window if open, or open it if not
    const r = await api.mapsLoad(id);
    if (r && r.ok) {
        // Close this window if launched stand-alone, or just close as success
        window.close();
    } else {
        alert('Impossible de charger la carte : ' + (r && r.error || 'inconnu'));
    }
}

async function confirmDelete(id) {
    const m = allMaps.find(x => x.id === id);
    if (!m) return;
    if (!confirm('Supprimer définitivement « ' + m.name + ' » ?\nL\'image sera effacée du disque.')) return;
    const r = await api.mapsDelete(id);
    if (r && r.ok) refresh();
}

function openModalAdd() {
    editingId = null;
    pickedFilePath = null;
    document.getElementById('modal-title').textContent = 'AJOUTER UNE CARTE';
    document.getElementById('row-file').style.display = '';
    document.getElementById('m-filename').textContent = 'Aucun fichier sélectionné';
    document.getElementById('m-name').value = '';
    document.getElementById('m-dcs').value = DCS_MAPS[0];
    document.getElementById('m-coord').value = '';
    document.getElementById('m-width').value = '';
    document.getElementById('m-height').value = '';
    document.getElementById('m-error').classList.remove('visible');
    document.getElementById('modal').classList.add('visible');
}

function openModalEdit(id) {
    const m = allMaps.find(x => x.id === id);
    if (!m) return;
    editingId = id;
    pickedFilePath = null;
    document.getElementById('modal-title').textContent = 'ÉDITER LA CARTE';
    document.getElementById('row-file').style.display = 'none';
    document.getElementById('m-name').value = m.name;
    document.getElementById('m-dcs').value = m.dcsMap;
    document.getElementById('m-coord').value = m.cornerCoord || '';
    document.getElementById('m-width').value = m.widthKm;
    document.getElementById('m-height').value = m.heightKm;
    document.getElementById('m-error').classList.remove('visible');
    document.getElementById('modal').classList.add('visible');
}

function closeModal() {
    document.getElementById('modal').classList.remove('visible');
}

document.getElementById('btn-add').addEventListener('click', openModalAdd);
document.getElementById('m-cancel').addEventListener('click', closeModal);

document.getElementById('m-pick').addEventListener('click', async () => {
    const r = await api.mapsPickFile();
    if (r && r.path) {
        pickedFilePath = r.path;
        document.getElementById('m-filename').textContent = r.name || r.path;
        if (!document.getElementById('m-name').value) {
            // Default the name to the filename without extension
            const baseName = (r.name || '').replace(/\.[^.]+$/, '');
            document.getElementById('m-name').value = baseName;
        }
    }
});

document.getElementById('m-save').addEventListener('click', async () => {
    const err = document.getElementById('m-error');
    const name = document.getElementById('m-name').value.trim();
    const dcs = document.getElementById('m-dcs').value;
    const cornerCoord = document.getElementById('m-coord').value.trim();
    const widthKm = parseFloat(document.getElementById('m-width').value);
    const heightKm = parseFloat(document.getElementById('m-height').value);

    if (!name) { err.textContent = 'Le nom est obligatoire.'; err.classList.add('visible'); return; }
    if (!dcs) { err.textContent = 'Sélectionnez une carte DCS.'; err.classList.add('visible'); return; }
    if (!cornerCoord) { err.textContent = 'Saisissez la coordonnée du coin haut-gauche.'; err.classList.add('visible'); return; }
    if (!widthKm || widthKm <= 0) { err.textContent = 'Largeur invalide.'; err.classList.add('visible'); return; }
    if (!heightKm || heightKm <= 0) { err.textContent = 'Hauteur invalide.'; err.classList.add('visible'); return; }

    if (editingId === null) {
        if (!pickedFilePath) { err.textContent = 'Sélectionnez un fichier image.'; err.classList.add('visible'); return; }
        try {
            const dataURL = await readFileAsDataURL(pickedFilePath);
            const thumb = await makeThumbnail(dataURL, 256);
            const r = await api.mapsAdd(pickedFilePath, {
                name, dcsMap: dcs, cornerCoord, widthKm, heightKm,
                imgWidth: thumb.imgWidth, imgHeight: thumb.imgHeight,
                thumbnailDataURL: thumb.dataURL
            });
            if (r && r.ok) { closeModal(); refresh(); }
            else { err.textContent = 'Erreur : ' + (r && r.error || '?'); err.classList.add('visible'); }
        } catch (e) {
            err.textContent = 'Erreur : ' + e.message; err.classList.add('visible');
        }
    } else {
        const r = await api.mapsUpdate(editingId, { name, dcsMap: dcs, cornerCoord, widthKm, heightKm });
        if (r && r.ok) { closeModal(); refresh(); }
        else { err.textContent = 'Erreur : ' + (r && r.error || '?'); err.classList.add('visible'); }
    }
});

// Helpers to read the picked file via the renderer (we use the data URL helper from the main process)
async function readFileAsDataURL(filePath) {
    const r = await api.mapsReadAsDataURL(filePath);
    if (r && r.ok) return r.dataURL;
    throw new Error(r && r.error || 'Lecture impossible');
}

function makeThumbnail(dataURL, size) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            // Fit by "cover" — preserves aspect ratio, fills the square
            const scale = Math.max(size / img.width, size / img.height);
            const sw = img.width * scale, sh = img.height * scale;
            const dx = (size - sw) / 2, dy = (size - sh) / 2;
            ctx.fillStyle = '#0a1012';
            ctx.fillRect(0, 0, size, size);
            ctx.drawImage(img, dx, dy, sw, sh);
            resolve({
                dataURL: canvas.toDataURL('image/png'),
                imgWidth: img.naturalWidth,
                imgHeight: img.naturalHeight
            });
        };
        img.onerror = () => reject(new Error('Image illisible'));
        img.src = dataURL;
    });
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('filter-dcs').addEventListener('change', render);

populateDcsSelects();
refresh();
</script>
</body>
</html>
